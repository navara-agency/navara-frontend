<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons — renamed from /favicon.* to /nv-icon* so Hostinger CDN's 7-day cache
         on the old paths can't serve stale binaries. New filenames have never been cached. -->
    <link rel="icon" type="image/x-icon" href="/nv-icon-v2.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/nv-icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/nv-icon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/nv-icon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/nv-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/nv-apple-touch.png" />
    <meta name="theme-color" content="#001192" />

    <!-- Open Graph (social link previews) -->
    <meta property="og:title" content="Navara | Integrated Growth Marketing" />
    <meta property="og:description" content="Navara is Egypt and Saudi Arabia's integrated growth marketing agency — strategy, creative, media buying, and analytics under one roof." />
    <meta property="og:image" content="https://navaraagency.com/og-image.png" />
    <meta property="og:url" content="https://navaraagency.com" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Navara | Integrated Growth Marketing</title>

    <!-- Schema.org organisation — helps Google show the logo in search results & knowledge panels -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Navara",
      "alternateName": "Navara Agency",
      "url": "https://navaraagency.com",
      "logo": "https://navaraagency.com/nv-icon-512.png",
      "image": "https://navaraagency.com/og-image.png",
      "description": "Egypt and Saudi Arabia's integrated growth marketing agency — strategy, creative, media buying, and analytics under one roof.",
      "areaServed": ["Egypt", "Saudi Arabia"],
      "sameAs": [
        "https://linkedin.com/company/navara",
        "https://instagram.com/navara"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
